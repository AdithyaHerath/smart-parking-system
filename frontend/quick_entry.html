<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Entry - Parking System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .mode-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .mode-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1.2rem;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 2px;
            font-weight: 600;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .result.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .hint {
            text-align: center;
            color: #999;
            font-size: 0.85rem;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚗 Quick Entry</h1>
        <p class="subtitle">Manual Plate Entry System</p>

        <div class="mode-toggle">
            <button class="mode-btn active" onclick="setMode('ENTRY')">
                🚪 ENTRY
            </button>
            <button class="mode-btn" onclick="setMode('EXIT')">
                🚀 EXIT
            </button>
        </div>

        <div class="input-group">
            <label for="plateInput">License Plate Number</label>
            <input type="text" id="plateInput" placeholder="KG7129" maxlength="10" autocomplete="off">
        </div>

        <button class="submit-btn" onclick="submitPlate()">
            <span id="btnText">Process Entry</span>
        </button>

        <div class="result" id="result"></div>

        <p class="hint">Format: 2-3 letters + 4 digits (e.g., KG7129, WP7129)</p>
    </div>

    <script>
        let currentMode = 'ENTRY';
        const API_BASE = 'http://localhost:5001/api';

        function setMode(mode) {
            currentMode = mode;

            // Update button styles
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Update submit button text
            document.getElementById('btnText').textContent =
                mode === 'ENTRY' ? 'Process Entry' : 'Process Exit';

            // Clear result
            document.getElementById('result').style.display = 'none';
        }

        function submitPlate() {
            const plate = document.getElementById('plateInput').value.trim().toUpperCase();

            if (!plate) {
                showResult('Please enter a plate number', 'error');
                return;
            }

            // Validate format
            const regex = /^[A-Z]{2,3}\d{4}$/;
            if (!regex.test(plate)) {
                showResult('Invalid format! Use: 2-3 letters + 4 digits', 'error');
                return;
            }

            // Send to backend
            const endpoint = currentMode === 'ENTRY' ? '/vehicle/entry' : '/vehicle/exit';
            const payload = { vehicle_number: plate };

            if (currentMode === 'ENTRY') {
                payload.owner_name = 'Manual Entry';
            }

            fetch(`${API_BASE}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        let message = `✅ ${currentMode} successful!`;

                        if (currentMode === 'ENTRY') {
                            message += `\nSlot: ${data.data.slot_number}`;
                        } else {
                            message += `\nFee: Rs.${data.data.parking_fee}`;
                        }

                        showResult(message, 'success');
                        document.getElementById('plateInput').value = '';
                    } else {
                        showResult(data.message, 'error');
                    }
                })
                .catch(err => {
                    showResult('Cannot connect to server. Is it running?', 'error');
                });
        }

        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = message;
            resultDiv.className = `result ${type}`;
            resultDiv.style.display = 'block';
        }

        // Submit on Enter key
        document.getElementById('plateInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitPlate();
            }
        });

        // Auto-focus input
        document.getElementById('plateInput').focus();
    </script>
</body>

</html>
